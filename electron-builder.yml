appId: com.amarobalsamo.aria-translate
productName: A.R.I.A. Translate
copyright: Copyright (c) 2026 Amaro Balsamo

directories:
  output: dist
  buildResources: build

files:
  - main.js
  - preload.js
  - package.json
  - src/**/*
  - renderer/**/*
  - node_modules/**/*
  - '!**/*.{md,map}'
  - '!**/test/**'
  - '!**/tests/**'

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: true
  shortcutName: A.R.I.A. Translate

publish:
  provider: github
  owner: ABEngineering
  repo: Translatte
