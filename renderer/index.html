<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'" />
<title>A.R.I.A. Translate</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="hud-grid"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-ring"></span>
    <div class="brand-text">
      <span class="brand-mark">A.R.I.A.</span>
      <span class="brand-sub">TRANSLATE</span>
    </div>
  </div>
  <div class="status" id="llmStatusBadge">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Initializing agent...</span>
  </div>
</header>

<main class="layout">
  <aside class="lang-panel">
    <div class="lang-group">
      <h2>From</h2>
      <div class="lang-toggle" id="sourceToggle" data-kind="source">
        <button type="button" data-code="it">Italian</button>
        <button type="button" data-code="en">English</button>
        <button type="button" data-code="de">German</button>
      </div>
    </div>
    <div class="lang-swap-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22">
        <path d="M7 7h11l-3-3M17 17H6l3 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="lang-group">
      <h2>To</h2>
      <div class="lang-toggle" id="targetToggle" data-kind="target">
        <button type="button" data-code="it">Italian</button>
        <button type="button" data-code="en">English</button>
        <button type="button" data-code="de">German</button>
      </div>
    </div>
  </aside>

  <section class="input-panel">
    <label class="panel-label" for="inputText">Text to translate</label>
    <textarea id="inputText" maxlength="2000" placeholder="Type the text you want to translate..."></textarea>
    <div class="input-footer">
      <span class="char-count"><span id="charCount">0</span> / 2000</span>
      <div class="translate-action">
        <span class="translate-meta" id="translateMeta"></span>
        <button type="button" id="translateBtn" class="translate-btn" disabled>
          <span class="translate-btn-ring"></span>
          <span class="translate-btn-label">Translate</span>
        </button>
      </div>
    </div>
  </section>
</main>

<footer class="output-row">
  <div class="output-card formal">
    <div class="output-header">
      <svg class="icon" viewBox="0 0 24 24" width="18" height="18"><path d="M4 8h16v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V8Z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M9 8V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      <h3>Formal</h3>
      <button type="button" class="copy-btn" data-target="formalOutput" aria-label="Copy formal translation">
        <svg viewBox="0 0 24 24" width="16" height="16"><rect x="8" y="8" width="12" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="4" y="4" width="12" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
    <div class="output-text" id="formalOutput" data-placeholder="The formal translation will appear here."></div>
  </div>
  <div class="output-card informal">
    <div class="output-header">
      <svg class="icon" viewBox="0 0 24 24" width="18" height="18"><path d="M4 5h16v10H9l-4 4V5Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <h3>Informal</h3>
      <button type="button" class="copy-btn" data-target="informalOutput" aria-label="Copy informal translation">
        <svg viewBox="0 0 24 24" width="16" height="16"><rect x="8" y="8" width="12" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="4" y="4" width="12" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
    <div class="output-text" id="informalOutput" data-placeholder="The informal translation will appear here."></div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
